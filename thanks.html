<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    radial-gradient(circle at 20% 0%,rgba(124,58,237,0.08) 0%,transparent 50%),
    radial-gradient(circle at 80% 100%,rgba(236,72,153,0.08) 0%,transparent 50%),
    linear-gradient(180deg,#fafafa 0%,#f4f4f5 100%);
  min-height:100vh;color:#1e293b;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  max-width:520px;width:100%;text-align:center;
  background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.8);border-radius:24px;padding:48px 36px;
  box-shadow:0 10px 40px rgba(124,58,237,0.1);
}
.icon{
  width:80px;height:80px;margin:0 auto 24px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:36px;font-weight:700;
  animation:pop .5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
h1{
  font-size:32px;font-weight:800;letter-spacing:-0.02em;line-height:1.2;
  background:linear-gradient(135deg,#7c3aed 0%,#ec4899 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:12px;
}
p{color:#64748b;font-size:16px;line-height:1.6;margin-bottom:28px}
.btn{
  display:inline-block;background:linear-gradient(135deg,#7c3aed 0%,#ec4899 100%);
  color:#fff;padding:14px 28px;border-radius:12px;
  font-weight:600;font-size:15px;text-decoration:none;
  transition:transform .2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,58,237,0.25)}
.link{display:block;margin-top:14px;color:#7c3aed;font-size:14px;text-decoration:none}
.link:hover{text-decoration:underline}
</style>
</head>
<body>

<main class="card">
  <div class="icon">✓</div>
  <h1>Ευχαριστούμε!</h1>
  <p>Το μήνυμά σου στάλθηκε με επιτυχία. Θα σου απαντήσουμε εντός 1–2 εργάσιμων ημερών.</p>
  <a href="/" class="btn">Επιστροφή στην αρχική</a>
  <a href="/articles/" class="link">ή διάβασε τα τελευταία άρθρα →</a>
</main>
