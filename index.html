<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Υπολογισμός Καθαρού Μισθού — Ελλάδα (2026)</title>

<style>
body{font-family:Arial;margin:0;background:#f7f7fb}

/* popup */
#popupAd{display:none}
</style>
</head>

<body>

<!-- ✅ POPUP -->
<div id="popupAd">
  <div onclick="closePopup()" style="
    position:fixed;inset:0;
    background:rgba(0,0,0,.6);
    z-index:9999;"></div>

  <div style="
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:#fff;
    padding:20px;
    border-radius:12px;
    z-index:10000;
    max-width:90%;">
    
    <button onclick="closePopup()" style="
      position:absolute;top:5px;right:10px;
      border:none;background:none;
      font-size:20px;cursor:pointer">✕</button>

    <div id="adContainer"></div>
  </div>
</div>


<h2 style="padding:20px">Υπολογιστής Μισθού</h2>

<div style="padding:20px">
  <input id="gross" placeholder="Μισθός">
  <button id="calcBtn">Υπολογισμός</button>

  <div id="results"></div>
</div>


<script>

/* ========== ΥΠΟΛΟΓΙΣΜΟΣ ========== */
function calc(){
  document.getElementById("results").innerHTML = "✅ Υπολογίστηκε!";
}


/* ========== BUTTON CLICK ========== */
document.getElementById('calcBtn').addEventListener('click', function(){
  calc();

  setTimeout(() => {
    showPopup();
  }, 5000);
});


/* ========== POPUP ========== */
function showPopup(){
  document.getElementById('popupAd').style.display = 'block';

  const ad = document.getElementById('adContainer');
  ad.innerHTML = '';

  const script = document.createElement('script');
  script.src = "//go.linkwi.se/delivery/js/crl.js";

  script.onload = () => {
    try{
      LinkwiseCreative.show("13117-140","CD28335","_blank");
    }catch(e){}
  };

  ad.appendChild(script);
}

function closePopup(){
  document.getElementById('popupAd').style.display = 'none';
}

</script>

</body>
</html>
